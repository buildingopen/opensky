name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip

      - name: Install packaging tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build distributions
        run: python -m build

      - name: Check built metadata
        run: python -m twine check dist/*

      - name: Upload release artifacts
        uses: actions/upload-artifact@v6
        with:
          name: python-package-distributions
          path: dist/*

  github-release:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v5
        with:
          name: python-package-distributions
          path: dist

      - name: Create or update GitHub release
        uses: actions/github-script@v8
        env:
          TAG_NAME: ${{ github.ref_name }}
        with:
          script: |
            const fs = require("fs");
            const path = require("path");
            const { owner, repo } = context.repo;
            const tag = process.env.TAG_NAME;

            let release;
            try {
              release = await github.rest.repos.getReleaseByTag({
                owner,
                repo,
                tag,
              });
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
              release = await github.rest.repos.createRelease({
                owner,
                repo,
                tag_name: tag,
                name: tag,
                generate_release_notes: true,
              });
            }

            const releaseId = release.data.id;
            const existingAssets = await github.rest.repos.listReleaseAssets({
              owner,
              repo,
              release_id: releaseId,
              per_page: 100,
            });

            for (const asset of existingAssets.data) {
              const assetPath = path.join("dist", asset.name);
              if (fs.existsSync(assetPath)) {
                await github.rest.repos.deleteReleaseAsset({
                  owner,
                  repo,
                  asset_id: asset.id,
                });
              }
            }

            for (const fileName of fs.readdirSync("dist")) {
              const filePath = path.join("dist", fileName);
              const stats = fs.statSync(filePath);
              await github.rest.repos.uploadReleaseAsset({
                owner,
                repo,
                release_id: releaseId,
                name: fileName,
                data: fs.readFileSync(filePath),
                headers: {
                  "content-type": "application/octet-stream",
                  "content-length": stats.size,
                },
              });
            }

  pypi-publish:
    runs-on: ubuntu-latest
    needs: build
    if: vars.PYPI_PUBLISH == 'true'
    permissions:
      id-token: write

    environment:
      name: pypi
      url: https://pypi.org/project/opensky-cli/

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v5
        with:
          name: python-package-distributions
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
