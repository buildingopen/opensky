name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Vercel
        run: vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  deploy-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.HETZNER_SSH_KEY }}

      - name: Trust Hetzner host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.HETZNER_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync API files
        run: |
          rsync -avz \
            api/main.py \
            api/alert_worker.py \
            api/zone_alert_worker.py \
            api/Dockerfile \
            api/requirements.txt \
            api/docker-compose.yml \
            "${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }}:/opt/flyfast/"

      - name: Rebuild and restart API
        run: |
          ssh "${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }}" \
            "cd /opt/flyfast && docker compose up -d --build --remove-orphans"

  verify-production:
    runs-on: ubuntu-latest
    needs:
      - deploy-web
      - deploy-api
    steps:
      - uses: actions/checkout@v4

      - name: Run production smoke test
        run: |
          API_BASE_URL="https://api.flyfast.app" \
          SITE_BASE_URL="https://flyfast.app" \
          bash scripts/smoke-test.sh
