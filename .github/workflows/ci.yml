name: CI

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest

      - name: Run test suite
        run: python -m pytest

  package:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip

      - name: Install packaging tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build distributions
        run: python -m build

      - name: Check built metadata
        run: python -m twine check dist/*

      - name: Install built wheel
        run: python -m pip install --force-reinstall dist/*.whl

      - name: Run CLI smoke checks
        run: |
          opensky --version | grep -q "opensky "
          skyroute --version | grep -q "opensky "
          opensky demo --json > /tmp/demo.json
          python - <<'PY'
          import json
          from pathlib import Path

          data = json.loads(Path("/tmp/demo.json").read_text())
          assert data, "demo output is empty"
          PY
          opensky zones > /tmp/zones.txt
          grep -q "Active Conflict Zones" /tmp/zones.txt

      - name: Upload build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: python-package-distributions
          path: dist/*
