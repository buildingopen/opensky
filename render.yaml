services:
  - type: web
    name: opensky-api
    runtime: python
    plan: starter
    buildCommand: pip install "git+https://github.com/buildingopen/opensky.git@fd9c0fe9a9e6818621d6dcd464def77f5637abc8" && pip install -r api/requirements.txt
    startCommand: cd api && uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/readyz
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: SKYROUTE_DUFFEL_TOKEN
        sync: false
      - key: SKYROUTE_AMADEUS_KEY
        sync: false
      - key: SKYROUTE_AMADEUS_SECRET
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: INTERNAL_API_TOKEN
        sync: false
      - key: ENVIRONMENT
        value: "production"
      - key: RATE_LIMIT_PER_HOUR
        value: "10"
      - key: REDIS_URL
        sync: false
      - key: ALLOW_RATE_LIMIT_FALLBACK
        value: "false"
      - key: RATE_LIMIT_PREFIX
        value: "opensky:ratelimit"
