services:
  - type: web
    name: opensky-api
    runtime: python
    plan: starter
    buildCommand: pip install "git+https://github.com/buildingopen/opensky.git@b315cba4eab4f572427fa2fdf3c5c0b8d39d4ed5" && pip install -r api/requirements.txt
    startCommand: cd api && uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/readyz
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: SKYROUTE_DUFFEL_TOKEN
        sync: false
      - key: SKYROUTE_AMADEUS_KEY
        sync: false
      - key: SKYROUTE_AMADEUS_SECRET
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: RATE_LIMIT_PER_HOUR
        value: "10"
      - key: REDIS_URL
        sync: false
      - key: RATE_LIMIT_PREFIX
        value: "opensky:ratelimit"
