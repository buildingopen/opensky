# Staging API - deploy separately from production
# Use for rollback drills and pre-production verification
services:
  - type: web
    name: opensky-api-staging
    runtime: python
    plan: starter
    buildCommand: pip install "git+https://github.com/buildingopen/opensky.git@eb315fb6498404db84aa85ed1757bd79f05a9f62" && pip install -r api/requirements.txt
    startCommand: cd api && uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/readyz
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: SKYROUTE_DUFFEL_TOKEN
        sync: false
      - key: SKYROUTE_AMADEUS_KEY
        sync: false
      - key: SKYROUTE_AMADEUS_SECRET
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: RATE_LIMIT_PER_HOUR
        value: "20"
      - key: REDIS_URL
        sync: false
      - key: RATE_LIMIT_PREFIX
        value: "opensky:ratelimit:staging"
